name: CI Pipeline - Build and Push to Docker Hub

# El disparador se activa únicamente al realizar un Pull Request hacia la rama main
on:
  pull_request:
    branches:
      - main

jobs:
  docker-ci:
    runs-on: ubuntu-latest

    steps:
      # 1. Obtener el código del repositorio (index.html, Dockerfile, etc.)
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Autenticación en Docker Hub usando los Secrets configurados
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.USER_DOCKERHUB }}
          password: ${{ secrets.PASSWORD_DOCKERHUB }}

      # 3. Construcción de la imagen y push al repositorio personal
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Se etiqueta con tu usuario y el nombre del proyecto definido en el README
          tags: ${{ secrets.USER_DOCKERHUB }}/actividad-aws-pipeline:latest